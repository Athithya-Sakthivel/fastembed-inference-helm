name: helm_security_scan

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helm-security-scan-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  SCANNER_IMAGE: ghcr.io/athithya-sakthivel/trivy-0.69.3-gitleaks-8.30.1-opengrep-1.16.5@sha256:2d19bd7b418692a20ae57b24620da3af648878a66d582022c0721512fff1b5e2
  TRIVY_SEVERITY: CRITICAL
  REPO_ROOT: ${{ github.workspace }}

jobs:
  scan:
    name: Helm + Infra Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run security scan
        run: |
          set -euo pipefail

          docker run --rm \
            -e TRIVY_SEVERITY="${TRIVY_SEVERITY}" \
            -v "${REPO_ROOT}:/workspace" \
            -w /workspace \
            --entrypoint /bin/sh \
            "$SCANNER_IMAGE" \
            -ec '
              set -eux

              echo "[INFO] OpenGrep scan (Helm + Kubernetes manifests)"
              opengrep scan \
                --config p/kubernetes \
                --config p/secrets \
                --config p/owasp-top-ten \
                --error \
                --max-target-bytes 2000000 \
                --exclude .git \
                chart/

              echo "[INFO] Gitleaks scan"
              gitleaks git \
                --log-opts="--all --full-history" \
                --redact \
                --exit-code 1

              echo "[INFO] Trivy filesystem scan"
              trivy fs \
                --scanners vuln,misconfig \
                --severity "$TRIVY_SEVERITY" \
                --ignore-unfixed \
                --skip-dirs .git \
                --exit-code 1 \
                chart/

              echo "[SUCCESS] All scans passed"
            '