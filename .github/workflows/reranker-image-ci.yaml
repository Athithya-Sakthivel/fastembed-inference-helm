name: reranker-image-ci

on:
  push:
    branches: [ main ]
    paths:
      - images/reranker/**
      - .github/workflows/reranker-image-ci.yaml
  pull_request:
    paths:
      - images/reranker/**
      - .github/workflows/reranker-image-ci.yaml

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: reranker-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-scan-push:
    name: Build, test, scan, publish reranker image
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: default

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata (Kolkata style tag, lowercase GHCR user)
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_GHCR_USER="${GHCR_USER:-${{ github.actor }}}"
          GHCR_USER="$(printf '%s' "${RAW_GHCR_USER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${IMAGE_NAME:-reranker}"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          RERANKER_IMAGE="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_STAGING="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:staging"
          echo "ghcr_user=${GHCR_USER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "reranker_image=${RERANKER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_staging=${IMAGE_STAGING}" >> "$GITHUB_OUTPUT"

      - name: Build image (load into runner for tests)
        id: build-image
        uses: docker/build-push-action@v4
        with:
          context: images/reranker
          file: images/reranker/Dockerfile
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.reranker_image }}
            ${{ steps.image-meta.outputs.image_staging }}
          cache-from: type=gha,scope=reranker-model
          cache-to: type=gha,mode=max,scope=reranker-model

      - name: Run service tests (build is loaded into local docker)
        shell: bash
        run: |
          set -euo pipefail
          cd images/reranker
          
          # Export variables for test script
          export RERANKER_MODEL_NAME="${RERANKER_MODEL_NAME:-Xenova/ms-marco-MiniLM-L-6-v2}"
          export RERANKER_MAX_DOCS="${RERANKER_MAX_DOCS:-50}"
          export RERANKER_IMAGE_TAG="${IMAGE_TAG:-${{ steps.image-meta.outputs.image_tag }}}"
          export IMAGE_REPO="${IMAGE_REPO:-${{ steps.image-meta.outputs.ghcr_user }}/${{ steps.image-meta.outputs.image_name }}}"
          export HF_TOKEN="${HF_TOKEN}"
          
          chmod +x test_reranker.sh
          TEST_MODE=cpu \
            RERANKER_MODEL_NAME="${RERANKER_MODEL_NAME}" \
            RERANKER_MAX_DOCS="${RERANKER_MAX_DOCS}" \
            HF_TOKEN="${HF_TOKEN}" \
            ./test_reranker.sh

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.build-image.outputs.imageid }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.image-meta.outputs.ghcr_user }}
          password: ${{ env.GIT_PAT }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.reranker_image }}"
          docker push "${{ steps.image-meta.outputs.image_staging }}"