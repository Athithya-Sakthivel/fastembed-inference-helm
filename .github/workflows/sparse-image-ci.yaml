name: sparse-image-ci

on:
  push:
    branches: [ main ]
    paths:
      - images/sparse/**
      - .github/workflows/sparse-image-ci.yaml
  pull_request:
    paths:
      - images/sparse/**
      - .github/workflows/sparse-image-ci.yaml

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: sparse-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache

jobs:
  build-test-scan-push:
    name: Build, test, scan, publish sparse image
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: default

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata (Kolkata style tag, lowercase GHCR user)
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_GHCR_USER="${GHCR_USER:-${{ github.actor }}}"
          GHCR_USER="$(printf '%s' "${RAW_GHCR_USER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${IMAGE_NAME:-sparse}"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          SPARSE_IMAGE="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_STAGING="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:staging"
          echo "ghcr_user=${GHCR_USER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sparse_image=${SPARSE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_staging=${IMAGE_STAGING}" >> "$GITHUB_OUTPUT"

      - name: Build image (load into runner for tests)
        id: build-image
        uses: docker/build-push-action@v4
        with:
          context: images/sparse
          file: images/sparse/Dockerfile
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.sparse_image }}
            ${{ steps.image-meta.outputs.image_staging }}
          cache-from: type=gha,scope=sparse-model
          cache-to: type=gha,mode=max,scope=sparse-model

      - name: Run service tests (build is loaded into local docker)
        shell: bash
        run: |
          set -euo pipefail
          cd images/sparse
          export SPARSE_MODEL_NAME="${SPARSE_MODEL_NAME:-prithivida/Splade_PP_en_v1}"
          export SPARSE_BATCH_SIZE="${SPARSE_BATCH_SIZE:-8}"
          export SPARSE_IMAGE_TAG="${IMAGE_TAG:-${{ steps.image-meta.outputs.image_tag }}}"
          export IMAGE_REPO="${IMAGE_REPO:-${{ steps.image-meta.outputs.ghcr_user }}/${{ steps.image-meta.outputs.image_name }}}"
          chmod +x test_sparse.sh
          TEST_MODE=cpu SPARSE_MODEL_NAME="${SPARSE_MODEL_NAME}" SPARSE_BATCH_SIZE="${SPARSE_BATCH_SIZE}" ./test_sparse.sh

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.build-image.outputs.imageid }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.image-meta.outputs.ghcr_user }}
          password: ${{ env.GIT_PAT }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.sparse_image }}"
          docker push "${{ steps.image-meta.outputs.image_staging }}"