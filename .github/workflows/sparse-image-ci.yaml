name: sparse-image-ci

on:
  push:
    branches: [ main ]
    paths:
      - images/sparse/**
      - .github/workflows/sparse-image-ci.yaml
  pull_request:
    paths:
      - images/sparse/**
      - .github/workflows/sparse-image-ci.yaml

permissions:
  contents: read

concurrency:
  group: sparse-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_IMAGE: ghcr.io/athithya-sakthivel/trivy:0.69.3-safe@sha256:bcc376de8d77cfea086917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache

jobs:
  build-test-scan-push:
    name: Build, test, scan, publish sparse image
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: default
    # GIT_PAT is expected to be provided by the default environment's secrets
    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Trivy cache key
        id: trivy-key
        shell: bash
        run: |
          set -euo pipefail
          echo "key=trivy-${RUNNER_OS}-$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Prepare Trivy cache
        shell: bash
        run: |
          mkdir -p "${TRIVY_CACHE_DIR}"

      - name: Restore Trivy cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: ${{ steps.trivy-key.outputs.key }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Compute image metadata (Kolkata style tag, lowercase GHCR user)
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_GHCR_USER="${GHCR_USER:-${{ github.actor }}}"
          GHCR_USER="$(printf '%s' "${RAW_GHCR_USER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${IMAGE_NAME:-sparse}"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          SPARSE_IMAGE="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_STAGING="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:staging"
          echo "ghcr_user=${GHCR_USER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sparse_image=${SPARSE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_staging=${IMAGE_STAGING}" >> "$GITHUB_OUTPUT"

      - name: Build image (load into runner for tests)
        id: build-image
        uses: docker/build-push-action@v4
        with:
          context: images/sparse
          file: images/sparse/Dockerfile
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.sparse_image }}
            ${{ steps.image-meta.outputs.image_staging }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Run service tests (build is loaded into local docker)
        shell: bash
        run: |
          set -euo pipefail
          cd images/sparse
          export SPARSE_MODEL_NAME="${SPARSE_MODEL_NAME:-prithivida/Splade_PP_en_v1}"
          export SPARSE_BATCH_SIZE="${SPARSE_BATCH_SIZE:-8}"
          export SPARSE_IMAGE_TAG="${IMAGE_TAG:-${{ steps.image-meta.outputs.image_tag }}}"
          export IMAGE_REPO="${IMAGE_REPO:-${{ steps.image-meta.outputs.ghcr_user }}/${{ steps.image-meta.outputs.image_name }}}"
          chmod +x test_sparse.sh
          TEST_MODE=cpu SPARSE_MODEL_NAME="${SPARSE_MODEL_NAME}" SPARSE_BATCH_SIZE="${SPARSE_BATCH_SIZE}" ./test_sparse.sh

      - name: Scan built image with Trivy (CI-level scan)
        shell: bash
        run: |
          set -euo pipefail
          scan_image="${{ steps.build-image.outputs.imageid }}"
          test -n "${scan_image}"
          ignore_args=()
          if [[ -f images/sparse/.trivyignore ]]; then
            ignore_args+=(--ignorefile /workspace/images/sparse/.trivyignore)
          elif [[ -f .trivyignore ]]; then
            ignore_args+=(--ignorefile /workspace/.trivyignore)
          fi
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --cache-dir /root/.cache/trivy \
            --scanners vuln \
            --severity CRITICAL \
            --exit-on-eol 1 \
            --exit-code 1 \
            "${ignore_args[@]}" \
            "${scan_image}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ steps.image-meta.outputs.ghcr_user }}
          password: ${{ env.GIT_PAT }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.sparse_image }}"
          docker push "${{ steps.image-meta.outputs.image_staging }}"