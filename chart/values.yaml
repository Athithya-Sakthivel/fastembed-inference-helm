global:
  createNamespace: true    # Create namespace if not present
  environment: prod        # Runtime environment label
  logLevel: info           # info, warning, debug, error
  cuda: false              # Global GPU toggle (services still control gpuCount)
  imagePullSecrets: []   # Private registry credentials (optional)

  monitoring:
    enabled: true       # master switch for metrics exposure
    mode: static        # static | servicemonitor
                        # static = Prometheus scrape_configs (no CRDs needed)
                        # servicemonitor = Prometheus Operator mode
    serviceMonitor:     # if mode = servicemonitor
      interval: 30s       # scrape frequency (Prometheus operator only)
      scrapeTimeout: 10s   # timeout per scrape
      path: /metrics      # metrics endpoint path

  nodeSelector: {}
  # (Optional) Schedule these pods only on specific nodes
  # Example:

  tolerations: []
  # (Optional) Allow scheduling onto tainted nodes
  # Example:

  networkPolicy:
    enabled: true  # Enforce namespace-based network isolation
    allowedNamespaces:  # Namespaces allowed to call these services
      - inference
      - indexing
      - monitoring
      - kube-prometheus-stack
    allowInternetEgress: true  # Allow outbound HTTPS for model downloads

  huggingface:
    existingSecret: ""  # Kubernetes Secret name containing HF_TOKEN; leave empty to disable
    tokenKey: HF_TOKEN  # Secret key name inside the Secret
    highPerformanceTransfer: true  # Enable faster HuggingFace transfer backend when supported

dense:
  enabled: true  # Enable the dense embedding service
  embedderImage: ghcr.io/athithya-sakthivel/dense:2026-05-17-09-19--d90465@sha256:76108859e4c6300ff21767c07f76a78dc77f26713efc29b280232d6107830bbc  # Immutable image pin
  modelName: "BAAI/bge-small-en-v1.5"  # Default dense embedding model(quantized, cpu scalable)
  dim: 384  # Expected embedding dimension
  batchSize: 16  # Max texts per /embed request
  normalize: true  # L2-normalize embeddings before returning
  gpuCount: 1  # Request GPU resources when global.cuda=true
  host: 0.0.0.0  # Bind address inside the container
  port: 8200  # Container HTTP port
  preloadModel: false  # Load model at startup instead of first request
  replicas: 1  # Desired replica count when HPA is disabled

  pdb:
    enabled: true  # Create a PodDisruptionBudget when replicas > 1
    minAvailable: 1  # Keep at least one pod available during voluntary disruptions

  hpa:
    enabled: false  # Enable CPU-based autoscaling
    min: 1  # Minimum replicas when HPA is enabled
    max: 3  # Maximum replicas when HPA is enabled
    targetCPU: 60  # Target average CPU utilization percentage
    resources:
      requests:
        cpu: 200m  # Baseline CPU request for the dense model
        memory: 256Mi  # Baseline memory request for the dense model
      limits:
        cpu: 2000m  # Upper CPU limit for bursty inference
        memory: 1Gi  # Upper memory limit for the container

sparse:
  enabled: true  # Enable the sparse embedding service
  embedderImage: ghcr.io/athithya-sakthivel/sparse:2026-05-17-09-19--d904650@sha256:e79ce38d2c619b43080e00d75bcaef004be49e80fd19d3f5c80a6265cc09bb42  # Immutable image pin
  modelName: "Qdrant/minicoil-v1"  # Default sparse embedding model (lightweight, cpu scalable)
  batchSize: 16  # Max texts per /embed request
  gpuCount: 0  # Sparse model runs on CPU by default
  host: 0.0.0.0  # Bind address inside the container
  port: 8201  # Container HTTP port
  preloadModel: false  # Load model at startup instead of first request
  replicas: 1  # Desired replica count when HPA is disabled

  pdb:
    enabled: true  # Create a PodDisruptionBudget when replicas > 1
    minAvailable: 1  # Keep at least one pod available during voluntary disruptions

  hpa:
    enabled: false  # Enable CPU-based autoscaling
    min: 1  # Minimum replicas when HPA is enabled
    max: 3  # Maximum replicas when HPA is enabled
    targetCPU: 60  # Target average CPU utilization percentage
    resources:
      requests:
        cpu: 500m  # Baseline CPU request for sparse encoding
        memory: 512Mi  # Baseline memory request for the sparse model
      limits:
        cpu: 2000m  # Upper CPU limit for bursty encoding
        memory: 1Gi  # Upper memory limit for the container

reranker:
  enabled: true  # Enable the reranker service
  embedderImage: ghcr.io/athithya-sakthivel/reranker:2026-05-17-09-19--d90465@sha256:16b0c826ec48428442eef5911d354483e9abddabb321778f278c44c62b56b575  # Immutable image pin
  modelName: "Xenova/ms-marco-MiniLM-L-6-v2"  # Default reranker model
  batchSize: 16  # Max query-document pairs per request
  maxDocs: 50  # (Server side upper bound) Max documents accepted per /rerank request. 
  gpuCount: 1  # Request GPU resources when global.cuda=true
  host: 0.0.0.0  # Bind address inside the container
  port: 8202  # Container HTTP port
  preloadModel: true  # Load model at startup; reranker is latency sensitive
  replicas: 1  # Desired replica count when HPA is disabled

  pdb:
    enabled: true  # Create a PodDisruptionBudget when replicas > 1
    minAvailable: 1  # Keep at least one pod available during voluntary disruptions

  hpa:
    enabled: false  # Enable CPU-based autoscaling
    min: 1  # Minimum replicas when HPA is enabled
    max: 3  # Maximum replicas when HPA is enabled
    targetCPU: 60  # Target average CPU utilization percentage
    resources:
      requests:
        cpu: 500m  # Baseline CPU request for the reranker
        memory: 512Mi  # Baseline memory request for the reranker
      limits:
        cpu: 4000m  # Upper CPU limit for bursty scoring
        memory: 2Gi  # Upper memory limit for the container