{{- if .Values.reranker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-reranker-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fastembed-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: reranker
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8202
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: fastembed-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: reranker
{{- end }}