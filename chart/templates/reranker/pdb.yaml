{{- if and (.Values.reranker.pdb.enabled | default true) (gt (int .Values.reranker.replicas) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-reranker-pdb
  labels:
    app.kubernetes.io/name: fastembed-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: reranker
spec:
  minAvailable: {{ .Values.reranker.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: reranker
{{- end }}