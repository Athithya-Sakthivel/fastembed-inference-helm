{{- if and (.Values.dense.pdb.enabled | default true) (gt (int .Values.dense.replicas) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-dense-pdb
  labels:
    app.kubernetes.io/name: fastembed-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dense
spec:
  minAvailable: {{ .Values.dense.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dense
{{- end }}