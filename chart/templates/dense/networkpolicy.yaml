{{- if and .Values.dense.enabled .Values.global.networkPolicy.enabled }}
{{- $service := "dense" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fastembed.networkPolicyName" (dict "service" $service) }}
  namespace: {{ .Values.dense.namespace }}
  labels:
    {{- include "fastembed.labels" (dict "Chart" .Chart "Release" .Release "name" "dense" "component" "embedder" "instance" "dense") | nindent 4 }}

spec:
  podSelector:
    matchLabels:
      {{- include "fastembed.selectorLabels" (dict "name" "dense" "component" "embedder" "instance" "dense") | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
  {{- range .Values.global.networkPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 8200
  {{- end }}

  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    {{- if .Values.global.networkPolicy.allowInternetEgress }}
    # Allow outbound HTTPS for HuggingFace/model downloads
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    {{- end }}

{{- end }}