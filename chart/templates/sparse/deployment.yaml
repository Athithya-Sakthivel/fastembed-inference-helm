apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sparse
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fastembed-inference
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: sparse
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.sparse.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fastembed-inference
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: sparse

  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastembed-inference
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sparse

    spec:
      automountServiceAccountToken: false

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: sparse
          image: {{ .Values.sparse.embedderImage | quote }}
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8201
              protocol: TCP

          env:
            - name: SPARSE_MODEL_NAME
              value: {{ .Values.sparse.modelName | quote }}

            - name: SPARSE_BATCH_SIZE
              value: {{ .Values.sparse.batchSize | quote }}

            - name: SPARSE_CUDA
              value: {{ ternary "1" "0" (and .Values.global.cuda (gt (int .Values.sparse.gpuCount) 0)) | quote }}

            - name: SPARSE_HOST
              value: {{ .Values.sparse.host | default "0.0.0.0" | quote }}

            - name: SPARSE_PORT
              value: {{ .Values.sparse.port | default 8201 | quote }}

            - name: SPARSE_LOGLEVEL
              value: {{ .Values.global.logLevel | upper | quote }}

            - name: ENV
              value: {{ .Values.global.environment | default "prod" | quote }}

            - name: PRELOAD_MODEL
              value: {{ ternary "1" "0" .Values.sparse.preloadModel | quote }}

            # Enable faster HuggingFace transfer backend when supported
            - name: HF_XET_HIGH_PERFORMANCE
              value: {{ ternary "1" "0" .Values.global.huggingface.highPerformanceTransfer | quote }}

            # Prevent slow/stalled model downloads on large models
            - name: HF_HUB_DOWNLOAD_TIMEOUT
              value: "120"

            - name: HF_HUB_ETAG_TIMEOUT
              value: "30"

            {{- if .Values.global.huggingface.existingSecret }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.huggingface.existingSecret }}
                  key: {{ .Values.global.huggingface.tokenKey | default "HF_TOKEN" }}
            {{- end }}

          resources:
            {{- toYaml .Values.sparse.hpa.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000

          terminationMessagePolicy: FallbackToLogsOnError